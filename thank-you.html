<!doctype html>
<html lang="uk">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Дякуємо за заявку</title>
    <style>
        :root {
            --bg: #ffffff;
            --surface: #f6efe4;
            --text: #2a2a2a;
            --muted: #666666;
            --line: #e8e8e8;
            --accent: #f28c28;
            --accent-hover: #df7c1c;
            --container: 760px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Inter", "Segoe UI", Roboto, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(100%, var(--container));
            border: 1px solid var(--line);
            background: var(--surface);
            border-radius: 18px;
            padding: 36px 30px;
            text-align: center;
        }

        .check {
            width: 62px;
            height: 62px;
            margin: 0 auto 16px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            display: grid;
            place-items: center;
            font-size: 30px;
            font-weight: 800;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(28px, 5vw, 40px);
            line-height: 1.2;
        }

        p {
            margin: 0 auto;
            max-width: 560px;
            color: var(--muted);
            font-size: 18px;
            line-height: 1.5;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 26px;
            min-height: 48px;
            padding: 0 20px;
            border-radius: 12px;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            text-decoration: none;
        }

        .back-link:hover {
            background: var(--accent-hover);
        }
    </style>
</head>
<body>
<main class="card">
    <div class="check">✓</div>
    <h1>Дякуємо за вашу заявку!</h1>
    <p>Ваш відгук успішно надіслано. Наш менеджер зв’яжеться з вами протягом 15 хвилин у робочий час, щоб уточнити деталі та надати розрахунок.</p>
    <a class="back-link" href="index.html">Повернутися на головну</a>
</main>
</body>
</html>
